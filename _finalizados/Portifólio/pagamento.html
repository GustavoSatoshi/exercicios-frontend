<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pagamento - SeuSite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-container container">
      <div class="logo">LuxCar</div>
    </div>
  </header>

  <main class="container pagamento-container" style="padding-top: 90px;">
    <section class="resumo-produto" id="resumo-produto">
      <h2>Resumo do Produto</h2>
      <!-- Produto carregado via JS -->
    </section>

    <section class="form-pagamento">
      <h2>Pagamento</h2>
      <form id="paymentForm">
        <input type="text" name="nome" placeholder="Nome Completo" required />
        <input type="text" name="cartao" placeholder="Número do Cartão" required maxlength="16" pattern="\d{16}" />
        <input type="text" name="validade" placeholder="Validade (MM/AA)" required pattern="(0[1-9]|1[0-2])\/\d{2}" />
        <input type="text" name="cvv" placeholder="CVV" required maxlength="3" pattern="\d{3}" />
        <button type="submit" class="btn-comprar">Finalizar Compra</button>
      </form>
    </section>
  </main>

  <script>
    // Carrega o produto selecionado do localStorage
    const produto = JSON.parse(localStorage.getItem('produtoSelecionado'));
    const resumoDiv = document.getElementById('resumo-produto');

    if (!produto) {
      resumoDiv.innerHTML = "<p>Nenhum produto selecionado.</p>";
      // Pode redirecionar para home se quiser
      // window.location.href = 'index.html';
    } else {
      resumoDiv.innerHTML += `
        <p><strong>Produto:</strong> ${produto.nome}</p>
        <p><strong>Valor:</strong> R$ ${produto.preco.toLocaleString('pt-BR')}</p>
        <hr/>
      `;
    }

    document.getElementById('paymentForm').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!produto) return alert("Nenhum produto selecionado para compra.");

      document.getElementById('paymentForm').addEventListener('submit', function(e) {
  e.preventDefault();
  if (!produto) return alert("Nenhum produto selecionado para compra.");

  // Criar toast de sucesso
  const toast = document.createElement("div");
  toast.className = "toast-success";
  toast.textContent = `✅ Pagamento aprovado para ${produto.nome}`;
  document.body.appendChild(toast);

  // Mostrar com animação
  setTimeout(() => {
    toast.classList.add("show");
  }, 100);

  // Após 3 segundos, redireciona
  setTimeout(() => {
    localStorage.removeItem("produtoSelecionado");
    window.location.href = "index.html";
  }, 3000);
});

    });
  </script>
</body>
</html>
