<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.caixa{
background-color: #fff;
width: 150px;
padding: 30px;      
color: black;
border: solid thin #ccc;
transition: 3s ease;
}
.caixa:hover{
    width: 400px;   
    background-color: #8c232c; 
    color: white;}




    </style>
</head>
<body>
    <h1>transiçoes e animaçoes</h1>
    <h2>transiçao 3</h2>
    <div class="caixa">conteudo inicial</div>
    <div class="caixa">conteudo hover</div>
</body>
</html>
