<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .caixa {
            background-color: #fff;
            width: 150px;
            padding: 30px;
            border: solid thin #ccc;
            transition-property: width;
            transition-duration: 3s;
            transition-timing-function: cubic-bezier(0.42, 0., 58, 1);
            transition-delay: 0s;
        }

        .caixa:hover {
            width: 400px;
            background-color: #8c232c; 
        }
    </style>
</head>


<body>
    <h1>transiçoes e animqçoes</h1>
    <h2>transiçao 1</h2>
    <div class="caixa">conteudo inicial</div>
   <div class="caixa">conteudo hover</div>
  
</body>
   
</html>
