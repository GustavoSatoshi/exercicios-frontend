<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LuxCar - Página Principal</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #000;
      color: #fff;
    }

    .hero {
      position: relative;
      background-image: url('https://images.unsplash.com/photo-1612832021054-2ff38eae5e14?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-overlay {
      background-color: rgba(0, 0, 0, 0.75); /* overlay escuro */
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-content {
      text-align: center;
      max-width: 700px;
      padding: 0 20px;
    }

    .hero-content h2 {
      font-size: 3rem;
      color: #FFD700; /* Amarelo ouro */
      margin-bottom: 1rem;
    }

    .hero-content p {
      font-size: 1.5rem;
      color: #f0f0f0;
      margin-bottom: 2rem;
    }

    .btn-primary {
      background-color: #FFD700;
      color: #000;
      padding: 15px 30px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 5px;
      transition: background 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #e6c200;
    }
  </style>
</head>
<body>

  <!-- SEÇÃO HERO -->
  <section class="hero">
    <div class="hero-overlay">
      <div class="hero-content">
        <h2>Seu próximo carro de luxo está aqui</h2>
        <p>Modelos exclusivos com entrega em todo o Brasil</p>
        <a href="categorias.html" class="btn-primary">Ver Catálogo</a>
      </div>
    </div>
  </section>

</body>
</html>
